services:
  minecraft:
    image: modded-minecraft-server
    build: .
    container_name: mc-server
    ports:
      - "25565:25565"
    environment:
      MODLOADER: forge
      MINECRAFT_VERSION: 1.20.1
      FORGE_VERSION: 47.2.0
      JAVA_MEMORY: 6G
      EULA: "true"
    volumes:
      - ./data:/data
      - ./modpack:/servers/modpack
      - ./backups:/backups
    restart: unless-stopped
    stdin_open: true
    tty: true
